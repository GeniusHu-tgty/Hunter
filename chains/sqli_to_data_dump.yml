# 用途: 对已授权的注入点执行分阶段 SQL 注入确认与有界数据枚举。
# 前置条件: 需要明确的注入端点和参数名；高影响步骤仍需审批。
# 期望结果: 形成数据库指纹、库表结构和有限用户数据的证据计划。
name: sqli_to_data_dump
description: Evidence-gated SQL injection validation with runtime target and injection-point parameters.
parameters:
  target_url:
    description: "目标根URL"
    required: true
    default: ""
  session_cookie:
    description: "会话Cookie（如JSESSIONID=xxx）"
    required: false
    default: ""
  csrf_token:
    description: "CSRF令牌值"
    required: false
    default: ""
  probe_path:
    description: "注入端点路径"
    required: false
    default: "/"
  parameter_name:
    description: "注入参数名"
    required: false
    default: "id"
  request_method:
    description: "注入请求方法"
    required: false
    default: "GET"
  database_name:
    description: "限定枚举的数据库名"
    required: false
    default: ""
  table_name:
    description: "限定枚举的数据表名"
    required: false
    default: ""
start: probe-injection
steps:
  - step_id: probe-injection
    name: Probe injection point
    action: exploit
    state: scan
    options:
      vuln_type: sqli
      confirmed: false
      action: probe_injection
      endpoint: "${target_url}${probe_path}"
      parameter: "${parameter_name}"
      method: "${request_method}"
      session_cookie: "${session_cookie}"
      csrf_token: "${csrf_token}"
    on_success: confirm-injection
    on_failure: ""
  - step_id: confirm-injection
    name: Confirm injection type
    action: exploit
    state: exploit
    options:
      vuln_type: sqli
      confirmed: true
      capabilities:
        - read
      action: confirm_injection_type
      endpoint: "${target_url}${probe_path}"
      parameter: "${parameter_name}"
      method: "${request_method}"
    on_success: database-version
    on_failure: ""
  - step_id: database-version
    name: Extract database version
    action: exploit
    options:
      vuln_type: sqli
      confirmed: true
      capabilities:
        - read
      approved_actions:
        - fingerprint_database
      action: fingerprint_database
      endpoint: "${target_url}${probe_path}"
      parameter: "${parameter_name}"
    on_success: enumerate-databases
    on_failure: ""
  - step_id: enumerate-databases
    name: Enumerate databases
    action: exploit
    options:
      vuln_type: sqli
      confirmed: true
      capabilities:
        - read
      approved_actions:
        - enumerate_databases
      action: enumerate_databases
      endpoint: "${target_url}${probe_path}"
    on_success: enumerate-tables
    on_failure: ""
  - step_id: enumerate-tables
    name: Enumerate tables
    action: exploit
    options:
      vuln_type: sqli
      confirmed: true
      capabilities:
        - read
      approved_actions:
        - enumerate_tables
        - identify_user_tables
      action: enumerate_tables
      database: "${database_name}"
    on_success: enumerate-columns
    on_failure: ""
  - step_id: enumerate-columns
    name: Enumerate columns
    action: exploit
    options:
      vuln_type: sqli
      confirmed: true
      capabilities:
        - read
      action: enumerate_columns
      database: "${database_name}"
      table: "${table_name}"
    on_success: export-data
    on_failure: ""
  - step_id: export-data
    name: Export bounded user rows
    action: exploit
    state: post_exploit
    options:
      vuln_type: sqli
      confirmed: true
      capabilities:
        - read
      approved_actions:
        - export_user_rows
      database: "${database_name}"
      table: "${table_name}"
      max_export_rows: 100
      action: export_user_rows
    critical: true
